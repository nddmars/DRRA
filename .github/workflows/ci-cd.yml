name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Python Backend
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run tests
      run: |
        pytest tests/test_services.py -v --tb=short --cov=backend --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  test-watcher:
    runs-on: ubuntu-latest
    name: Test Rust Watcher
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
    
    - name: Check formatting
      run: cd watchers && cargo fmt -- --check
    
    - name: Run clippy
      run: cd watchers && cargo clippy -- -D warnings
    
    - name: Run tests
      run: cd watchers && cargo test --verbose
    
    - name: Build release
      run: cd watchers && cargo build --release

  build-dashboard:
    runs-on: ubuntu-latest
    name: Build React Dashboard
    
    strategy:
      matrix:
        node-version: ['18.x']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: cd dashboard && npm install
    
    - name: Build
      run: cd dashboard && npm run build
    
    - name: Test
      run: cd dashboard && npm test -- --passWithNoTests

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, test-watcher, build-dashboard]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: resilience-forge:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  notify:
    runs-on: ubuntu-latest
    name: Notify Status
    if: always()
    needs: [test-backend, test-watcher, build-dashboard, security-scan]
    
    steps:
    - name: Check job status
      run: |
        if [ "${{ needs.test-backend.result }}" = "failure" ] || \
           [ "${{ needs.test-watcher.result }}" = "failure" ] || \
           [ "${{ needs.build-dashboard.result }}" = "failure" ]; then
          echo "❌ CI/CD Pipeline Failed"
          exit 1
        else
          echo "✅ CI/CD Pipeline Passed"
        fi
