# DRRA Splunk Add-on: inputs.conf
# Configures data collection from DRRA backend via scripted/modular inputs.
# Deploy to: $SPLUNK_HOME/etc/apps/drra_addon/default/inputs.conf

# ---------------------------------------------------------------------------
# DRRA VIGIL Events (scripted input via REST API poll)
# ---------------------------------------------------------------------------
[script://./bin/drra_vigil_events.py]
disabled    = 0
interval    = 30
sourcetype  = drra:vigil
index       = drra_events
source      = drra:vigil:events

[script://./bin/drra_shield_events.py]
disabled    = 0
interval    = 30
sourcetype  = drra:shield
index       = drra_events
source      = drra:shield:events

[script://./bin/drra_dashboard_metrics.py]
disabled    = 0
interval    = 300
sourcetype  = drra:dashboard
index       = drra_events
source      = drra:dashboard:metrics

# ---------------------------------------------------------------------------
# DRRA Log Files (file-based input if DRRA writes to filesystem)
# ---------------------------------------------------------------------------
[monitor:///var/log/drra/vigil.json]
disabled    = 0
sourcetype  = drra:vigil
index       = drra_events

[monitor:///var/log/drra/shield.json]
disabled    = 0
sourcetype  = drra:shield
index       = drra_events

# ---------------------------------------------------------------------------
# Kafka Input (if using Splunk Connect for Kafka)
# Requires: splunk-kafka-connect or kafka-connect-splunk
# ---------------------------------------------------------------------------
# [kafka://drra-detection-events]
# disabled    = 0
# kafka_brokers = localhost:7300
# topic       = drra-detection-events
# sourcetype  = drra:vigil
# index       = drra_events
