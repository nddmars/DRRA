# DRRA Splunk Add-on: transforms.conf
# Field extractions and lookups for drra:vigil, drra:shield sourcetypes.

# ---------------------------------------------------------------------------
# JSON field aliases (drra:vigil)
# ---------------------------------------------------------------------------
[drra_vigil_fields]
REGEX   = .
SOURCE_KEY = _raw
FORMAT  = event_type hostname severity confidence entropy_score files_modified source_ip timestamp incident_id

# ---------------------------------------------------------------------------
# Severity lookup (normalize DRRA levels to Splunk urgency)
# ---------------------------------------------------------------------------
[drra_severity_lookup]
filename    = drra_severity.csv
max_matches = 1

# ---------------------------------------------------------------------------
# MITRE ATT&CK technique lookup
# ---------------------------------------------------------------------------
[drra_mitre_lookup]
filename    = drra_mitre_techniques.csv
max_matches = 5

# ---------------------------------------------------------------------------
# Host-to-segment lookup (for blast radius mapping)
# ---------------------------------------------------------------------------
[drra_host_segment_lookup]
filename    = drra_host_segments.csv
max_matches = 1
