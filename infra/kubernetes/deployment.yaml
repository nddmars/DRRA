"""
Kubernetes deployment manifests for Resilience Forge
"""

---
apiVersion: v1
kind: Namespace
metadata:
  name: resilience-forge

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: resilience-forge-config
  namespace: resilience-forge
data:
  MINIO_ENDPOINT: "minio:9000"
  DATABASE_URL: "postgresql://drra_admin:drra_secure_password@postgres:5432/resilience_forge"
  REDIS_URL: "redis://redis:6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resilience-api
  namespace: resilience-forge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: resilience-api
  template:
    metadata:
      labels:
        app: resilience-api
    spec:
      containers:
      - name: api
        image: resilience-forge:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: resilience-forge-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: resilience-api
  namespace: resilience-forge
spec:
  selector:
    app: resilience-api
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: resilience-forge
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: drra_admin
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: POSTGRES_DB
          value: resilience_forge
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: "10Gi"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: resilience-forge
spec:
  serviceName: minio
  replicas: 4
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        command:
        - /bin/sh
        - -c
        - "/usr/bin/minio server /minio --console-address :9001"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: password
        volumeMounts:
        - name: minio-storage
          mountPath: /minio
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
  volumeClaimTemplates:
  - metadata:
      name: minio-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: "50Gi"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: resilience-forge
type: Opaque
stringData:
  password: drra_secure_password

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: resilience-forge
type: Opaque
stringData:
  password: minioadmin

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resilience-api-hpa
  namespace: resilience-forge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resilience-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
